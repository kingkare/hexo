friends_vue:
  enable: false
  vue_js: https://npm.elemecdn.com/anzhiyu-theme-static@1.1.1/friends/index.4f887d95.js
  apiurl: "https://pyq.hywiki.pp.ua/all?start=0&end=30&rule=updated" # 朋友圈后端地址
  top_tips: 使用 友链朋友圈 订阅友链最新文章
  top_background: https://testingcf.jsdelivr.net/gh/kingkare/owo/img/friends.jpg

# 深色模式粒子效果canvas
universe:
  enable: true

# 页面卡片顶部气泡升起效果
bubble:
  enable: true

#  控制台打印信息
console:
  enable: true

# 51a统计配置
LA:
  enable: false
  ck:
  LingQueMonitorID:

# Umami 统计配置（关于页面访问统计卡片）
# 文档: https://umami.is/docs/api
umami:
  enable: false
  # Umami API 地址，如 https://analytics.example.com
  apiHost:
  # 网站 ID
  websiteId:
  # API Token（在 Umami 后台 Settings -> API Keys 中生成）
  token:

# 标签卖萌
diytitle:
  enable: true
  leaveTitle: w(ﾟДﾟ)w 不要走！再看看嘛！
  backTitle: ♪(^∇^*)欢迎肥来！

# 评论弹幕配置
comment_barrage_config:
  enable: true
  # 同时最多显示弹幕数
  maxBarrage: 1
  # 弹幕显示间隔时间ms
  barrageTime: 6000
  # token，在控制台中获取
  accessToken: "8195ec373f105113a0284e26c828b66e"
  # 博主邮箱md5值
  mailMd5: "bff75e3831fbf9d43a257c59fe521d11"

# 左下角音乐配置项
# https://github.com/metowolf/MetingJS
nav_music:
  enable: true
  console_widescreen_music: false # 宽屏状态控制台显示音乐而不是标签 enable为true 控制台依然会显示
  id: 8152976493
  server: netease
  volume: 0.7 # 默认音量
  all_playlist: https://y.qq.com/n/ryqq/playlist/8802438608

# 路径为 /music 的音乐页面默认加载的歌单 1. nav_music 2. custom
music_page_default: nav_music

# 评论匿名邮箱
visitorMail:
  enable: true
  mail: "houyi@houyi.us.ci"

# ptool 文章底部工具
ptool:
  enable: true
  share_mobile: true
  share_weibo: true
  share_copyurl: true
  categories: false # 是否显示分类
  mode: # 运营模式与责任，不配置不显示

# 欢迎语配置
greetingBox:
  enable: true #开启后必须配置下面的list对应的时间段，不然会出现小白条
  default: 晚上好👋
  list:
    - greeting: 晚安😴
      startTime: 0
      endTime: 5
    - greeting: 早上好鸭👋, 祝你一天好心情！
      startTime: 6
      endTime: 9
    - greeting: 上午好👋, 状态很好，鼓励一下～
      startTime: 10
      endTime: 10
    - greeting: 11点多啦, 在坚持一下就吃饭啦～
      startTime: 11
      endTime: 11
    - greeting: 午安👋, 宝贝
      startTime: 12
      endTime: 14
    - greeting: 🌈充实的一天辛苦啦！
      startTime: 14
      endTime: 18
    - greeting: 19点喽, 奖励一顿丰盛的大餐吧🍔。
      startTime: 19
      endTime: 19
    - greeting: 晚上好👋, 在属于自己的时间好好放松😌~
      startTime: 20
      endTime: 24
# 欢迎语配置结束

# 文章顶部ai摘要
post_head_ai_description:
  enable: true
  gptName: AnZhiYu
  mode: local # 默认模式 可选值: tianli/local
  switchBtn: false # 可以配置是否显示切换按钮 以切换tianli/local
  btnLink: https://afdian.net/item/886a79d4db6711eda42a52540025c377
  randomNum: 3 # 按钮最大的随机次数，也就是一篇文章最大随机出来几种
  basicWordCount: 1000 # 最低获取字符数, 最小1000, 最大1999
  key: xxxx
  Referer: https://xx.xx/

# 快捷键配置
shortcutKey:
  enable: true
  delay: 100 # 所有键位延时触发而不是立即触发（包括shift，以解决和浏览器键位冲突问题）
  shiftDelay: 200 # shift按下延时多久开启

# 无障碍优化（在首页按下「shift + ?」以查看效果）
accesskey:
  enable: true

# 友情链接顶部相关配置
linkPageTop:
  enable: false
  title: 与数百名博主无限进步
  # 添加博主友链的评论自定义格式
  addFriendPlaceholder: "昵称（请勿包含博客等字样）：\n网站地址（要求博客地址，请勿提交个人主页）：\n头像图片url（请提供尽可能清晰的图片，我会上传到我自己的图床）：\n描述：\n站点截图（可选）：\n"

# 缩略图后缀 archive/tag/category 页面单独开启后缀
pageThumbnailSuffix: ""

# 隐私协议弹窗
agreementPopup:
  enable: false
  url: /privacy

# 右键菜单
rightClickMenu:
  enable: true

# 首页随便逛逛人潮汹涌people模式 而非技能点模式，关闭后为技能点模式需要配置creativity.yml
peoplecanvas:
  enable: true
  img:  https://testingcf.jsdelivr.net/gh/kingkare/owo/img/ahugecrowd.webp
  background_image: https://testingcf.jsdelivr.net/gh/kingkare/owo/img/2025-04-01.png #背景图
  #下面是新增的
  rows: 13 # 精灵图列数，默认15
  cols: 4 # 精灵图行数，默认7
  scale: 0.5 # 人物大小缩放比例 (0.1-1.0)，默认1.0
  density: 0.6 # 人物密度 (0.1-2.0)，默认1.0
  speed: 0.8 # 人物移动速度 (0.1-3.0)，默认1.0
  offsetY: 148 # 垂直位置偏移 (-200 到 200，负值向上，正值向下)，默认0
# 人潮汹涌结束
# 动效控制
dynamicEffect:
  postTopWave: true # 文章顶部波浪效果
  postTopRollZoomInfo: true # 文章顶部滚动时缩放
  pageCommentsRollZoom: true # 非文章页面评论滚动时缩放显示（仅仅Twikoo生效）

# Inject
# Insert the code to head (before '</head>' tag) and the bottom (before '</body>' tag)
# 插入代码到头部 </head> 之前 和 底部 </body> 之前
inject:
  head:
    # 自定义css
    # - <link rel="stylesheet" href="/css/custom.css" media="defer" onload="this.media='all'">.
    - <link rel="stylesheet" href="/css/Custom.css"> # 自定义CSS    
    - <link rel="stylesheet" href="/css/todolist.css"> # 待办清单页
    - <link rel="stylesheet" href="https://testingcf.jsdelivr.net/gh/kingkare/owo/css/fps.css"> # FPS所需文件
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kingkare/owo/css/polish-animation.css"> # 主页文章卡片添加擦亮动画效果
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kingkare/owo/css/Personal-card-beautification.css"> # 个人卡片美化
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kingkare/owo/css/all.css"> # loading加载动画魔改用的fontawesome图标                          

  bottom:
    # 自定义js
    # - <script src="/js/xxx"></script>
    - <script src="https://testingcf.jsdelivr.net/gh/kingkare/owo/js/Cherryblossoms.js"></script>  # 落樱特效js文件
    - <script src="https://testingcf.jsdelivr.net/gh/kingkare/owo/js/fps.js"></script>  # FPS所需文件
    - <script async data-pjax src="https://cdn.jsdelivr.net/gh/kingkare/owo/js/Footer-Pets.js" defer></script> # 页脚宠物图
    - <script src="https://cdn.jsdelivr.net/gh/nextapps-de/winbox/dist/winbox.bundle.min.js"></script> # 背景切换弹
    - <script src="/js/custom.js"></script> # 这个代表自定义js，放在最下面       

# CDN
# Don't modify the following settings unless you know how they work
# 非必要请不要修改
CDN:
  # The CDN provider of internal scripts (主题内部 js 的 cdn 配置)
  # option: local/elemecdn/jsdelivr/unpkg/cdnjs/onmicrosoft/cbd/anheyu/custom
  # Dev version can only choose. ( dev版的主题只能设置为 local )
