# aside (侧边栏设置)
# --------------------------------------

aside:
  enable: true # 启用
  hide: false # 隐藏
  button: true # 按钮
  mobile: true # 在手机上显示
  position: right # left or right  左或右
  display: # 控制对应详情页面是否显示侧边栏
    archive: true # 档案
    tag: true  # 标签
    category: true # 类别
  card_author:  # 卡片作者
    enable: true  # 启用
    # 描述
