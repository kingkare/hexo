# 导航配置
menu:
  文章:
    隧道: /archives/ || anzhiyu-icon-box-archive
    分类: /categories/ || anzhiyu-icon-shapes
    标签: /tags/ || anzhiyu-icon-tags

  友链:
    友人帐: /link/ || anzhiyu-icon-link
    # 朋友圈: /fcircle/ || anzhiyu-icon-artstation
    留言板: /comments/ || anzhiyu-icon-envelope

  我的:
    音乐馆: /music/ || anzhiyu-icon-music
    # 追番页: /bangumis/ || anzhiyu-icon-bilibili
    相册集: /album/ || anzhiyu-icon-images
    小空调: /air-conditioner/ || anzhiyu-icon-fan
    藏宝阁: /TreasurePavilion/ || anzhiyu-icon-cube faa-tada  

  关于:
    关于本人: /about/ || anzhiyu-icon-paper-plane
    闲言碎语: /essay/ || anzhiyu-icon-lightbulb
    随便逛逛: javascript:toRandomPost() || anzhiyu-icon-shoe-prints1
    待办清单: /todolist/ || anzhiyu-icon-stream faa-tada

# 导航配置结束

# 导航栏设置
nav:
  enable: true  # 是否启用 nav导航 左侧项目按钮，仅控制左侧项目按钮
  travelling: true # 是否启用 nav导航 开往按钮
  clock: false  # 是否启用 nav导航 左侧和风天气
  menu:
    - title: 网页
      item:
        - name: 博客
          link: https://hexo.anheyu.com/
          icon: /img/favicon.ico
    - title: 项目
      item:
        - name: 安知鱼图床
          link: https://image.anheyu.com/
          icon: https://image.anheyu.com/favicon.ico

# 导航栏设置结束

# mourn （哀悼日，指定日期网站简单变灰，不包括滚动条）
# 注意： 仅网站首页变灰，其他页面正常显示
mourn:
  enable: false
  days: [4-5, 5-12, 7-7, 9-18, 12-13]

# Code Blocks (代码相关)
# --------------------------------------

highlight_theme: mac #  darker-深黑/Pale Night-苍夜/Light-浅色/Ocean-海洋/Mac-Mac 风格/Mac Light-Mac 亮色/False-关 / 否
highlight_copy: true # 复制按钮是否开启
highlight_lang: true # 显示代码语言是否开启
highlight_shrink: true # true：缩小代码块 / false：展开代码块 | none：展开代码块并隐藏按钮 | 代码框不展开，需点击 '>' 打开
highlight_height_limit: 330 # 代码高度限制 单位: px 直接添加数字，如330 可配置为 false
code_word_wrap: true  # 代码换行是否开启

# copy settings
# copyright: Add the copyright information after copied content (複制的内容后面加上版权信息)
# copy: enable 复制后弹窗提示版权信息
copy:
  enable: true
  copyright:
    enable: false
    limit_count: 50

# social settings (个人卡片社交图标设置)开始
# formal:
#   name: link || icon
social:
  Github: https://github.com/kingkare || anzhiyu-icon-github
  BiliBili: https://t.me/hy33_bot || anzhiyu-icon-paper-plane

# social settings (个人卡片社交图标设置)结束

# 作者卡片 状态 头像 标签开始
author_status:
  enable: false
  # 可以是任何图片，建议放表情包或者emoji图片，效果都很好，[表情包速查](https://emotion.xiaokang.me/)
  statusImg: "https://bu.dusays.com/2023/08/24/64e6ce9c507bb.png"
  skills:
    - 🤖️ 数码科技爱好者
    - 🔍 分享与热心帮助
    - 🏠 智能家居小能手
    - 🔨 设计开发一条龙
    - 🤝 专修交互与设计
    - 🏃 脚踏实地行动派
    - 🧱 团队小组发动机
    - 💢 壮汉人狠话不多

# 作者卡片 状态 头像 标签结束

# search (搜索)
# --------------------------------------

# Algolia search
algolia_search:
  enable: false
  hits:
    per_page: 6
  tags:
    # - 前端
    # - Hexo

# Docsearch
# Apply and Option Docs: see https://docsearch.algolia.com/
# Crawler Admin Console: see https://crawler.algolia.com/
# Settings: https://www.algolia.com/
docsearch:
  enable: false
  appId: # see email
  apiKey: # see email
  indexName: # see email
  option:

# Local search
local_search:
  enable: false
  preload: true
  CDN:

# Math (数学)
# --------------------------------------
# About the per_page
# if you set it to true, it will load mathjax/katex script in each page (true 表示每一页都加载js)
# if you set it to false, it will load mathjax/katex script according to your setting (add the 'mathjax: true' in page's front-matter)
# (false 需要时加载，须在使用的 Markdown Front-matter 加上 mathjax: true)

# MathJax
mathjax:
  enable: false
  per_page: false

# KaTeX
katex:
  enable: false
  per_page: false
  hide_scrollbar: true

# Image (图片设置)
# --------------------------------------

# Favicon（网站图标）
favicon: /favicon.ico

# Avatar (头像)
avatar:
  img: https://bu.dusays.com/2023/04/27/64496e511b09c.jpg
  effect: false

# Disable all banner image
disable_top_img: false

# The banner image of home page
index_img: false # "background: url() top / cover no-repeat"

# If the banner of page not setting, it will show the top_img
default_top_img: false

# 文章封面开始
cover:
  # 是否显示文章封面
  index_enable: true  # 主页是否显示文章封面图
  aside_enable: true  # 侧栏是否显示文章封面图
  archives_enable: true # 归档页面是否显示文章封面图
  #  主页卡片文章封面显示的位置
  #  三个值可配置 left -左边 /right - 右边 /both -封面位置以左右左右轮流显示    左/右/两侧
  position: both
  # 当封面未设置时，将显示默认封面 可配置图片链接/顔色/渐变色等
  default_cover:
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/2024-09-08.png
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/2024-09-21.jpg
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/2025-02-06.jpg
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/2025-04-01.png
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/5aa75d77102ae.jpg
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/63ee1e43b9f70.png
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/login-bg-3.jpg
    - https://testingcf.jsdelivr.net/gh/kingkare/owo/img/s10.webp

# 文章封面开始结束
# 404开始
# Replace Broken Images (替换无法显示的图片)
error_img:
  flink: https://testingcf.jsdelivr.net/gh/kingkare/owo/img/friend_404.gif
  post_page: https://testingcf.jsdelivr.net/gh/kingkare/owo/img/404.jpg

# 一个简单的 404 页面
error_404:
  enable: true
  subtitle: "请尝试站内搜索寻找文章"
  background: https://testingcf.jsdelivr.net/gh/kingkare/owo/img/645907596997d.gif
# 404结束

# 文章 meta 显示 文章相关信息显示开始
post_meta:
  page: # 首页
    date_type: created # created -创建  or updated -更新 or both -两者都有  主页文章日期是创建日或者更新日或都显示
    date_format: simple # date/relative/simple 显示明确时间还是相对日期 或者 简单日期
    categories: true # true or false 主页是否显示分类
    tags: true # true or false 主页是否显示标籤
    label: false # true or false 显示描述性文字
  post:
    date_type: both # created or updated or both 文章页日期是创建日或者更新日或都显示
    date_format: date # date/relative 显示明确时间还是相对日期
    categories: true # true or false 文章页是否显示分类
    tags: true # true or false 文章页是否显示标籤
    label: true # true or false 显示描述性文字
    unread: true # true or false 文章未读功能

# 文章 meta 显示 文章相关信息显示结束

# 主色调相关配置
mainTone:
  enable: false # true or false 文章是否启用获取图片主色调
  mode: api # colorthief/cdn/api/both colorthief模式为前端获取图片主色调，cdn模式为图片url+imageAve参数获取主色调，api模式为请求API获取主色调，both模式会先请求cdn参数，无法获取的情况下将请求API获取，可以在文章内配置main_color: '#3e5658'，使用十六进制颜色，则不会请求colorthief/cdn/api/both获取主色调，而是直接使用配置的颜色
  # 项目地址：https://github.com/anzhiyu-c/img2color-go
  api: https://img2color-go.vercel.app/api?img= # mode为api时可填写
  cover_change: true # 整篇文章跟随cover修改主色调

# wordcount (字数统计)
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 在首页显示文章简介
# 1：显示描述
# 2：显示描述或自动摘要（如果存在描述，则显示描述；否则显示自动摘要）
# 3：显示自动摘要（默认）
# false：不显示文章简介
index_post_content:
  method: 3
  length: 500 # 若将方法设置为2或3，则需配置长度。

# 锚点
# 当你在帖子中滚动时，URL会根据标题ID进行更新。
anchor: true

# Post
# --------------------------------------

# toc (目录)
toc:
  post: true
  page: true
  number: true
  expand: false
  style_simple: false # for post

# 文章版权开始
post_copyright:
  enable: true
  decode: false
  author_href:
  location: 中国
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/
  avatarSinks: false # hover时头像下沉
  copyright_author_img_back:
  copyright_author_img_front:
  copyright_author_link: /

# 文章版权开始 结束

# 文章打赏 赞助/奖励 开始

reward:
  enable: true
  coinAudio: https://npm.elemecdn.com/akilar-candyassets@1.0.36/audio/aowu.m4a # 打赏音效
  QR_code:
    - img: https://npm.elemecdn.com/anzhiyu-blog@1.1.6/img/post/common/qrcode-weichat.png #图片链接
      link: # 可以为空
      text: 微信
    - img: https://npm.elemecdn.com/anzhiyu-blog@1.1.6/img/post/common/qrcode-alipay.png
      link:
      text: 支付宝

# 文章打赏 赞助/奖励 结束

# 文章编辑按钮
# 轻松在线浏览和编辑博客源代码。
post_edit: # 目前仅可选择一个平台在线编辑
  enable: false
  # github: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # For example: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  github: false

  # yuque: https://www.yuque.com/user-name/repo-name/
  # 示例: https://www.yuque.com/yuque/yuque/
  # 你需要在语雀文章 Front Matter 添加参数 id 并确保其唯一性（例如 “id: yuque”, “id: 01”）
  yuque: false
# 文章编辑按钮结束
# 相关文章
related_post:
  enable: true
  limit: 6 # 显示的帖子数量
  date_type: created # or created or updated 文章日期显示创建日或者更新日

# 相关文章结束

# figcaption (图片描述文字)
photofigcaption: false

# 文章分页按钮
# value: 1 || 2 || 3 || 4 || false
# 1: The 'next post' will link to old post “下一篇文章”将链接到旧文章。
# 2: The 'next post' will link to new post “下一篇文章”将链接到新文章。
# 3: 只有下一篇，并且只在文章滚动到评论区时显示下一篇文章(旧文章)
# 4: 只有下一篇，并且只在文章滚动到评论区时显示下一篇文章(旧文章) 显示图片cover
# false: 禁用分页
post_pagination: 2
# 文章分页按钮结束
# 文章过期提醒 开始
noticeOutdate:
  enable: true
  style: flat # 风格：simple/flat  简约/扁平
  limit_day: 365 # 距离更新时间多少天才显示文章过期提醒
  position: top # 位置: top/bottom  顶部/底部
  message_prev: 本篇文章从发布到现在已经隔了
  message_next: 里面的内容可能过期了，你要自己甄别一下哟👉👈 # days since the last update, the content of the article may be outdated.

# 文章过期提醒结束

# Share System (分享功能)
# --------------------------------------

# Share.js
# https://github.com/overtrue/share.js
sharejs:
  enable: true
  sites: facebook,twitter,wechat,weibo,qq

# AddToAny
# https://www.addtoany.com/
addtoany:
  enable: false
  item: facebook,twitter,wechat,sina_weibo,email,copy_link

# 评论系统
# --------------------------------------

comments:
  # 最多可显示两条评论，第一条评论将默认显示。
  # 选择：Valine/Waline/Twikoo/Artalk
  use: Twikoo  # Twikoo/Waline 使用的评论（请注意，最多支持两个，如果不需要请留空）
  text: true # 是否显示评论服务商的名字
  # 延迟加载：评论系统将在评论元素进入浏览器可视区域时加载。
  # 若将其设为true，评论计数将失效
  lazyload: false
  count: true # 是否在文章顶部显示评论数
  card_post_count: false # 在首页显示文章卡片评论数量

# valine
# https://valine.js.org
valine:
  appId: xxxxx # leancloud application app id
  appKey: xxxxx # leancloud application app key
  pageSize: 10 # comment list page size
  avatar: mp # gravatar style https://valine.js.org/#/avatar
  lang: zh-CN # i18n: zh-CN/zh-TW/en/ja
  placeholder: 填写QQ邮箱就会使用QQ头像喔~. # valine comment input placeholder (like: Please leave your footprints)
  guest_info: nick,mail,link # valine comment header info (nick/mail/link)
  recordIP: false # Record reviewer IP
  serverURLs: # This configuration is suitable for domestic custom domain name users, overseas version will be automatically detected (no need to manually fill in)
  bg: /img/comment_bg.png # valine background
  emojiCDN: //i0.hdslb.com/bfs/emote/ # emoji CDN
  enableQQ: true # enable the Nickname box to automatically get QQ Nickname and QQ Avatar
  requiredFields: nick,mail # required fields (nick/mail)
  visitor: false
  master:
    - xxxxx
  friends:
    - xxxxxx
  tagMeta: "博主,小伙伴,访客"
  option:

# waline - A simple comment system with backend support fork from Valine
# https://waline.js.org/
waline:
  serverURL: # Waline server address url
  bg: # Waline background
  pageview: false
  meta_css: false # 是否引入 waline-meta.css ,以便显示 meta图标
  imageUploader: true # 配置为 > 换行后可自定义图片上传逻辑，示例: https://waline.js.org/cookbook/customize/upload-image.html#案例
  # 以下为可选配置，后续若有新增/修改配置参数可在此自行添加/修改
  option:

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId: https://twikoo.hywiki.pp.ua/ #环境地址
  region:
  visitor: false #false # 是否显示文章阅读数
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  visitor: false
  option:

# giscus
# https://giscus.app/
giscus:
  repo: # GitHub repository name
  repo_id: # GitHub repository id
  category_id: # GitHub repository category id
  theme:
    light: light
    dark: dark
  option: # options
    data-lang: zh-CN
    data-mapping:
    data-category:
    data-input-position:

