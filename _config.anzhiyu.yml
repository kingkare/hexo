    name_link: /about  # 名称链接

  card_announcement: # 卡片公告
    enable: true  # 启用/关闭
    content: 欢迎来看我的博客鸭~  # 公告内容

  card_weixin:  # 微信卡片
    enable: true # 启用/关闭
    face: https://bu.dusays.com/2023/01/13/63c02edf44033.png  # 表面
    backFace: https://bu.dusays.com/2023/05/13/645fa415e8694.png  # 背面

  card_recent_post: # 最近帖子
    enable: true  # 启用/关闭
    limit: 5 # 若设置为0，则显示全部
    sort: date # date or updated 日期或更新时间
    sort_order: # 除非了解其工作原理，否则请勿修改该设置。

  card_categories: # 分类卡片
    enable: true  # 启用/关闭
    limit: 8 # 若设置为0，则显示全部
    expand: none # none/true/false
    sort_order: # 除非了解其工作原理，否则请勿修改该设置。

  card_tags: # 标签卡片
    enable: true  # 启用/关闭
    limit: 20 # 若设置为0，则显示全部
    color: true # 颜色
    sort_order: # 除非了解其工作原理，否则请勿修改该设置。  排序顺序
    highlightTags:  # 高亮标签
      - Hexo
      - 前端
      - Adobe
      - Canva

  card_archives: # 卡片档案
    enable: true # 启用/关闭
    type: monthly # yearly or monthly 每年或每月
    format: 01 2026 # eg: YYYY年MM月 /例如：YYYY年MM月
    order: -1 # 排序顺序。1 表示升序；-1 表示降序
    limit: 8 # 若设置为0，则显示全部
    sort_order: # 除非了解其工作原理，否则请勿修改该设置。

  card_webinfo: # 卡片网页信息
    enable: true # 启用/关闭
    post_count: true # 文章数量
    last_push_date: true # 最后推送日期
    sort_order: # 除非了解其工作原理，否则请勿修改该设置。

# aside (侧边栏设置结束) 

# busuanzi count for PV / UV in site  busuanzi 统计网站的PV/UV数据
# 访问人数
busuanzi:
  site_uv: true  # 网站_uv 
  site_pv: true  # 网站访问量
  page_pv: true  # 页面浏览量

# 网页已运行时间开始
# Time difference between publish date and now (网页运行时间) 发布时间与当前时间的时差
# Formal: Month/Day/Year Time or Year/Month/Day Time 正式格式：月/日/年 时分或 年/月/日 时分
runtimeshow:  # 运行时显示
  enable: true # 启用/关闭
  publish_date: 2026-01-20 00:00:00  # 发布日期

# 网页已运行时间结束

# 控制台 - 最新评论
newest_comments: # 最新评论
  enable: true   # 启用/关闭
  sort_order: # 除非了解其工作原理，否则请勿修改该设置。
  limit: 6    # 限制
  storage: 10 # 单位：分钟，将数据保存至本地存储
  avatar: true  # 头像

# 右下角按钮开始
# --------------------------------------

# 繁体中文和简体中文之间的转换
translate:
  enable: true
  # 按钮上的文字
  default: 繁
  # 右键菜单默认文本
  rightMenuMsgDefault: "轉為繁體"
  # 网站语言（1 - 繁体中文 / 2 - 简体中文）
  defaultEncoding: 2
  # 时间延迟
  translateDelay: 0 
  # 当语言设置为简体中文时，按钮上显示的文字
  msgToTraditionalChinese: "繁"
  # 当语言设置为繁体中文时，按钮上的文字
  msgToSimplifiedChinese: "简"
  # 右键单击菜单，选择繁体中文。
  rightMenuMsgToTraditionalChinese: "转为繁体"
  # 右键菜单（简体中文）
  rightMenuMsgToSimplifiedChinese: "转为简体"

# 右下角按钮结束

# 阅读模式
readmode: true

# 中控台
centerConsole:
  enable: true
  card_tags:
    enable: true
    limit: 40 # 若设置为0，则显示全部
    color: false
    sort_order: # 除非您了解其工作原理，否则请勿修改设置。
    highlightTags:
      # - Hexo
      # - 前端
  card_archives:
    enable: true
    type: monthly # 按年或按月
    format: MMMM YYYY # eg: YYYY年MM月
    order: -1 # 排序方式：1，asc 表示升序；-1，desc 表示降序。
    limit: 8 # 如果设置为 0，则显示全部
    sort_order: # 除非您了解其工作原理，否则请勿修改设置。

# 中控台结束

# 深色模式
darkmode:
  enable: true
  # 切换按钮用于在深色/浅色模式间切换
  button: true
  # 自动切换深色模式和浅色模式
  # autoChangeMode: 1 跟随系统而变化，不支持的浏览器/系统将按照时间 start 到 end 之间切换为浅色模式 light mode 
  # autoChangeMode: 2 只按照时间 start 到 end 之间的时间切换为浅色模式 light mode ,其余时间为深色模式 dark mode
  # autoChangeMode: false 取消自动切换
  autoChangeMode: 1  # 自动切换模式
  start: 8   # 浅色模式开始时间
  end:   18   # 浅色模式结束时间

# 除非您了解这些设置的工作原理，否则请勿修改以下设置。 (非必要请不要修改 )
# 选择：阅读模式、翻译、深色模式、隐藏侧边栏、目录、聊天、评论
# Don't repeat 不要重複
rightside_item_order:  # 右侧项目顺序
  enable: false
  # 阅读模式,翻译,深色模式,隐藏侧边栏
  hide: # readmode,translate,darkmode,hideAside
  # 目录,聊天,评论
  show: # toc,chat,comment


# 图片大图查看模式开始
# --------------------------------------
# You can only choose one, or neither (只能选择一个 或者 两个都不选)

# medium-zoom 中等缩放
# https://github.com/francoischalifour/medium-zoom
medium_zoom: false

# 花式弹出框
# fancybox
# http://fancyapps.com/fancybox/3/
fancybox: true

# 图片大图查看模式结束

# Tag Plugins settings (标籤外挂)
# --------------------------------------

# mermaid
# see https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # built-in themes: default/forest/dark/neutral
  theme:
    light: default
    dark: dark

# 注释（Bootstrap 提示框） Note 标签（提示框/便签）
note:
  # 注释标签样式值：
  #  - simple    bs-callout 旧版提示框样式。默认值。简约风。采用旧版的 bs-callout 警告框样式
  #  - modern    bs-callout 新版（v2-v3）提示框样式。现代风。采用新版（v2-v3 版本）的 bs-callout 警告框样式。
  #  - flat      带背景的扁平化提示框样式，类似 Mozilla 或 StackOverflow 风格。扁平风。带有背景色的扁平化呼出框样式。
  #  - disabled  禁用注释标签的所有 CSS 样式导入。禁用。禁用 Note 标签所有 CSS 样式的导入。
  style: flat
  icons: true
  border_radius: 3

# 调整现代风格和扁平风格背景较浅颜色的偏移量（以百分比表示）（现代风格：-12 | 12；扁平风格：-18 | 6）。
# 此偏移量也适用于标签变量。此选项可与禁用的注释标签一起使用。
  light_bg_offset: 0
 
# 图标配置开始
icons:
  ali_iconfont_js: # 阿里图标symbol 引用链接，主题会进行加载 symbol 引用
  fontawesome: false #是否启用fontawesome6图标
  fontawesome_animation_css: #fontawesome_animation 如果有就会加载，示例值：https://npm.elemecdn.com/hexo-butterfly-tag-plugins-plus@1.0.17/lib/assets/font-awesome-animation.min.css

# 图标配置结束

# other
# --------------------------------------

# Pjax
# 它可能存在漏洞且不稳定，发现问题时请反馈。
# https://github.com/MoOx/pjax
pjax:
  enable: true
  exclude:
    - /music/
    - /no-pjax/

# Inject the css and script (aplayer/meting)
aplayerInject:
  enable: true
  per_page: true

# Snackbar (Toast Notification 弹窗) Snackbar 弹窗
# https://github.com/polonel/SnackBar
# position 弹窗位置
# 可选 top-left / top-center / top-right / bottom-left / bottom-center / bottom-right  左上角 / 上中 / 右上角 / 左下角 / 下中 / 右下角
snackbar:
  enable: true
  position: top-center
  bg_light: "#425AEF" # 浅色模式下Toast通知的背景颜色
  bg_dark: "#1f1f1f" # 深色模式下Toast通知的背景颜色

# Snackbar 弹窗

# https://instant.page/
# prefetch (预加载)
